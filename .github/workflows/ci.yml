name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: Soroban Contract
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check --manifest-path contracts/repoflow/Cargo.toml

      - name: Run clippy
        run: cargo clippy --manifest-path contracts/repoflow/Cargo.toml -- -D warnings

      - name: Build contract
        run: cargo build --release --manifest-path contracts/repoflow/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path contracts/repoflow/Cargo.toml

      - name: wasm build
        run: cargo build --release --target wasm32v1-none --manifest-path contracts/repoflow/Cargo.toml